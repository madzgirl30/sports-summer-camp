<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Camp SparkMotion</title>
  <link rel="stylesheet" href="styles.css">
</head>
  <script src="main.js"></script>
<body>
<header class="site-header"><nav class="navbar"><a class="logo" href="index.html">Camp SparkMotion</a><button class="nav-toggle" aria-label="Toggle navigation">☰</button><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="programs.html">Programs</a></li><li><a href="schedule.html">Schedule</a></li><li><a href="team.html">Team</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="faq.html">FAQ</a></li><li><a href="register.html">Register</a></li></ul></nav></header>
<main>
  <section class="page-hero compact"><h1>Camp Interest Form</h1><p>Complete this form to show interest in Camp SparkMotion.</p></section>
  <section class="section form-section">
    <form id="registrationForm" class="camp-form">
      <label for="parentName">Parent/Guardian Name</label>
      <input type="text" id="parentName" name="parentName" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="camperName">Camper Name</label>
      <input type="text" id="camperName" name="camperName" required>

      <label for="camperAge">Camper Age</label>
      <input type="number" id="camperAge" name="camperAge" min="8" max="13" required>

      <label for="programChoice">Favorite Program</label>
      <select id="programChoice" name="programChoice" required>
        <option value="">Choose one</option>
        <option>Robotics Relay</option>
        <option>Basketball Analytics</option>
        <option>Soccer Engineering</option>
        <option>Code the Scoreboard</option>
        <option>Launch Lab</option>
        <option>Speed Science</option>
      </select>

      <label for="comment">Camper Question or Goal</label>
      <textarea id="comment" name="comment" rows="4" placeholder="Example: I want to build a robot."></textarea>

      <button class="btn primary" type="submit">Submit Interest Form</button>
    </form>

    <aside class="form-output">
      <h2>Form Preview</h2>
      <p id="formMessage">Your submitted information will appear here.</p>
       <div id="formPreview"></div>
    </aside>
  </section>
</main>
<footer class="site-footer"><p>&copy; 2026 Camp SparkMotion. </p></footer><script src="js/main.js"></script></body>
</html>
